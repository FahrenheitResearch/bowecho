name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: bowecho

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "BowEcho ${GITHUB_REF_NAME}" \
              --generate-notes
          fi

  build:
    needs: create-release
    if: ${{ always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: bowecho-windows-x64
            package: windows
          - os: windows-11-arm
            artifact_name: bowecho-windows-arm64
            package: windows
          - os: ubuntu-24.04
            artifact_name: bowecho-linux-x64
            package: linux
          - os: ubuntu-24.04-arm
            artifact_name: bowecho-linux-arm64
            package: linux
          - os: macos-15-intel
            artifact_name: bowecho-macos-intel
            package: macos
          - os: macos-15
            artifact_name: bowecho-macos-apple-silicon
            package: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgl1-mesa-dev \
            libx11-dev \
            libxi-dev \
            libxkbcommon-dev

      - name: Use stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build release binary
        run: cargo build --release -p app_ui --bin bowecho

      # Signs bowecho.exe via Azure Trusted Signing when the secrets exist
      # (docs/SIGNING.md) — silently skipped until then, so adding the
      # secrets is the ONLY step needed to start shipping signed builds.
      - name: Sign Windows binary (Azure Trusted Signing)
        if: runner.os == 'Windows' && env.AZURE_TENANT_ID != ''
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TS_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TS_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TS_PROFILE }}
          files-folder: target/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item target\release\bowecho.exe package\bowecho.exe
          Copy-Item README.md package\README.md
          Copy-Item LICENSE-MIT package\LICENSE-MIT
          Copy-Item LICENSE-APACHE package\LICENSE-APACHE
          Compress-Archive -Path package\* -DestinationPath "dist\${{ matrix.artifact_name }}.zip" -Force

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          app="BowEcho.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp "target/release/${BIN_NAME}" "$app/Contents/MacOS/${BIN_NAME}"
          cp README.md "$app/Contents/Resources/README.md"
          cp LICENSE-MIT "$app/Contents/Resources/LICENSE-MIT"
          cp LICENSE-APACHE "$app/Contents/Resources/LICENSE-APACHE"
          chmod +x "$app/Contents/MacOS/${BIN_NAME}"
          cat > "$app/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>BowEcho</string>
            <key>CFBundleExecutable</key>
            <string>bowecho</string>
            <key>CFBundleIdentifier</key>
            <string>research.fahrenheit.bowecho</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>BowEcho</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.7.0</string>
            <key>CFBundleVersion</key>
            <string>0.7.0</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

      # Signs + notarizes BowEcho.app when the Apple secrets exist
      # (docs/SIGNING.md) — silently skipped until then, so adding the
      # secrets is the ONLY step needed to ship Gatekeeper-clean builds.
      # Signs + notarizes BowEcho.app with the repo's Developer ID
      # certificate and App Store Connect API key (docs/SIGNING.md).
      - name: Sign and notarize macOS app
        if: runner.os == 'macOS' && env.MACOS_CERTIFICATE_BASE64 != ''
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          app="BowEcho.app"
          keychain="$RUNNER_TEMP/signing.keychain-db"
          keychain_password="$(openssl rand -base64 24)"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 1800 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$keychain" \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$keychain_password" "$keychain" > /dev/null
          security list-keychains -d user -s "$keychain" login.keychain-db
          identity="$(security find-identity -v -p codesigning "$keychain" \
            | awk -F '"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$identity" ]; then
            echo "No Developer ID Application identity found in certificate" >&2
            exit 1
          fi
          echo "Signing with: $identity"
          codesign --force --deep --options runtime --timestamp \
            --sign "$identity" "$app"
          codesign --verify --deep --strict "$app"
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k --sequesterRsrc --keepParent "$app" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" --wait
          xcrun stapler staple "$app"
          spctl --assess --type execute --verbose "$app" || true
          security delete-keychain "$keychain"

      - name: Zip macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent "BowEcho.app" "dist/${{ matrix.artifact_name }}.zip"

      - name: Package Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist" "package/${BIN_NAME}"
          cp "target/release/${BIN_NAME}" "package/${BIN_NAME}/${BIN_NAME}"
          cp README.md "package/${BIN_NAME}/README.md"
          cp LICENSE-MIT "package/${BIN_NAME}/LICENSE-MIT"
          cp LICENSE-APACHE "package/${BIN_NAME}/LICENSE-APACHE"
          tar -C package -czf "dist/${{ matrix.artifact_name }}.tar.gz" "${BIN_NAME}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
