name: BowEcho
options:
  bundleIdPrefix: research.fahrenheit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: X65S282G57
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "1"
    # Let the pre-build script invoke cargo and write to ../target.
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  BowEcho:
    type: application
    platform: iOS
    sources:
      - path: BowEcho/Sources
    info:
      path: BowEcho/Info.plist
      properties:
        CFBundleDisplayName: BowEcho
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "Centers the radar on storms near you."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: research.fahrenheit.bowecho
        PRODUCT_NAME: BowEcho
        SWIFT_OBJC_BRIDGING_HEADER: BowEcho/BowEcho-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(SRCROOT)/include
        OTHER_LDFLAGS: -lbowecho_ffi
      configs:
        Debug:
          LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]: $(SRCROOT)/../target/aarch64-apple-ios-sim/debug
          LIBRARY_SEARCH_PATHS[sdk=iphoneos*]: $(SRCROOT)/../target/aarch64-apple-ios/debug
        Release:
          LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]: $(SRCROOT)/../target/aarch64-apple-ios-sim/release
          LIBRARY_SEARCH_PATHS[sdk=iphoneos*]: $(SRCROOT)/../target/aarch64-apple-ios/release
    preBuildScripts:
      - name: Build Rust engine (bowecho_ffi)
        basedOnDependencyAnalysis: false
        script: |
          set -e
          export PATH="$HOME/.cargo/bin:$PATH"
          case "$PLATFORM_NAME" in
            iphonesimulator) RUST_TARGET=aarch64-apple-ios-sim ;;
            *)               RUST_TARGET=aarch64-apple-ios ;;
          esac
          PROFILE_FLAG=""
          [ "$CONFIGURATION" = "Release" ] && PROFILE_FLAG="--release"
          cd "$SRCROOT/.."
          cargo build -p bowecho_ffi --target "$RUST_TARGET" $PROFILE_FLAG
